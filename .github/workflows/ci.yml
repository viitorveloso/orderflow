name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Unit tests (race)
        run: go test -race ./...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orderflow
          POSTGRES_PASSWORD: orderflow
          POSTGRES_DB: orderflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orderflow"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Integration tests (race)
        env:
          TEST_DATABASE_URL: postgres://orderflow:orderflow@localhost:5432/orderflow?sslmode=disable
        run: go test -tags=integration -race ./internal/repository/...
