services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orderflow
      POSTGRES_PASSWORD: orderflow
      POSTGRES_DB: orderflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderflow -d orderflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENV: development
      PORT: "8080"
      DATABASE_URL: "postgres://orderflow:orderflow@db:5432/orderflow?sslmode=disable"
      JWT_SECRET: "dev-secret-change-me-in-prod-0123456789"
      JWT_TTL: "24h"
    ports:
      - "8080:8080"

volumes:
  pgdata:
